name: datetime
description: 获取当前日期和时间信息
version: 1.0.0
author: rucora Team
tags:
  - utility
  - time
timeout: 10
input_schema:
  type: object
  properties:
    format:
      type: string
      description: 时间格式（strftime 格式）
      default: "%Y-%m-%d %H:%M:%S"
    timezone:
      type: string
      description: 时区（如 Asia/Shanghai）
      default: "UTC"
output_schema:
  type: object
  properties:
    success:
      type: boolean
    datetime:
      type: string
    timestamp:
      type: integer
