[package]
name = "rucora-skills-example"
version.workspace = true
edition = "2024"
description = "rucora Agent + Skills 简单示例"
publish = false

[dependencies]
rucora = { workspace = true, features = ["full"] }
rucora-core.workspace = true
rucora-tools.workspace = true
rucora-providers.workspace = true
rucora-skills.workspace = true
tokio = { version = "1", features = ["full"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
dotenv = "0.15"
