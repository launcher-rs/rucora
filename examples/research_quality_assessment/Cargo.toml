[package]
name = "research_quality_assessment"
version.workspace = true
edition = "2024"
description = "rucora 研究质量评分示例 - 展示评分系统用法"
publish = false

[dependencies]
rucora = { workspace = true, features = ["full"] }
rucora-core.workspace = true
rucora-providers.workspace = true
rucora-tools.workspace = true
tokio = { version = "1", features = ["full"] }
serde_json = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenv = "0.15"

[profile.release]
opt-level = 3
lto = true