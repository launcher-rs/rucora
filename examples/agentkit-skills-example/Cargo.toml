[package]
name = "agentkit-skills-example"
version.workspace = true
edition = "2024"
description = "AgentKit Agent + Skills 简单示例"
publish = false

[dependencies]
agentkit = { path = "../../agentkit", features = ["runtime"] }
agentkit-core = { path = "../../agentkit-core" }
tokio = { version = "1", features = ["full"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
