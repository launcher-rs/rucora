[package]
name = "rucora-deep-research-agentic"
version.workspace = true
edition = "2024"
description = "rucora Agentic 自主研究示例"
publish = false

[dependencies]
rucora.workspace = true
rucora-core.workspace = true
rucora-providers.workspace = true
rucora-tools.workspace = true
tokio = { version = "1", features = ["full"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenv = "0.15"