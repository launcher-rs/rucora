[package]
name = "iterative_research"
version.workspace = true
edition = "2024"
description = "rucora 迭代深化研究示例 - 多轮迭代深化研究"
publish = false

[dependencies]
rucora = { workspace = true, features = ["full"] }
rucora-core.workspace = true
rucora-providers.workspace = true
rucora-tools.workspace = true
tokio = { version = "1", features = ["full"] }
serde_json = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenv = "0.15"
async-trait = "0.1"
chrono = "0.4"

[profile.release]
opt-level = 3
lto = true