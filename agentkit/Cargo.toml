[package]
name = "agentkit"
version = "0.1.0"
edition = "2024"

[dependencies]
agentkit-core = { path = "../agentkit-core" }
agentkit-runtime = { path = "../agentkit-runtime" }
async-trait = "0.1"
reqwest = { version = "0.13", features = ["json", "stream"] }
futures-util = "0.3"
async-stream = "0.3"
bytes = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["process", "fs", "time"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
