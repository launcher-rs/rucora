[package]
name = "agentkit"
version = "0.1.0"
edition = "2024"

[lib]
doctest = false

[dependencies]
agentkit-core = { path = "../agentkit-core" }
agentkit-runtime = { path = "../agentkit-runtime" }
async-trait = "0.1"
reqwest = { version = "0.13", features = ["json", "stream","query", "gzip", "brotli", "deflate", "zstd"] }
futures-util = "0.3"
async-stream = "0.3"
bytes = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
dom_smoothie = "0.16"
html2text = "0.12"
tokio = { version = "1", features = ["process", "fs", "time"] }
tracing = "0.1"
rhai = { version = "1", features = ["serde", "sync"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
