[package]
name = "agentkit"
version.workspace = true
edition = "2021"

[lib]
doctest = false

[features]
default = ["runtime", "skills"]
runtime = []
mcp = ["dep:agentkit-mcp"]
a2a = ["dep:agentkit-a2a"]
skills = ["dep:agentkit-skills"]
rhai-skills = ["agentkit-skills?/rhai-skills"]

[dependencies]
agentkit-core = { path = "../agentkit-core" }
agentkit-mcp = { path = "../agentkit-mcp", optional = true }
agentkit-a2a = { path = "../agentkit-a2a", optional = true, default-features = true }
agentkit-skills = { path = "../agentkit-skills", optional = true, default-features = true }
async-trait = "0.1"
reqwest = { version = "0.13", features = ["json", "stream","query", "gzip", "brotli", "deflate", "zstd"] }
futures-util = "0.3"
async-stream = "0.3"
bytes = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
dom_smoothie = "0.16"
html2text = "0.12"
tokio = { version = "1", features = ["process", "fs", "time", "sync"] }
tracing = "0.1"
rhai = { version = "1", features = ["serde", "sync"] }
url = "2"
regex = "1"
thiserror = "2"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
criterion = "0.5"

[[bench]]
name = "json_serialize"
harness = false

[[bench]]
name = "vector_store_search"
harness = false
