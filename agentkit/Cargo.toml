[package]
name = "agentkit"
version.workspace = true
edition = "2024"

[lib]
doctest = false

[features]
default = ["runtime", "skills"]
runtime = []
# MCP 协议支持
mcp = ["dep:rmcp"]
# A2A 协议支持
a2a = ["dep:ra2a"]
# Skills 技能系统
skills = ["dep:rhai", "dep:serde_yaml"]
# Rhai 脚本技能支持
rhai-skills = ["skills"]
# MCP 完整功能
mcp-full = ["mcp"]
# A2A 完整功能
a2a-full = ["a2a", "ra2a/full"]

[dependencies]
agentkit-core = { path = "../agentkit-core" }
# 直接依赖外部库，不再通过独立 crate
rmcp = { version = "1.2.0", features = ["client", "reqwest", "transport-streamable-http-client-reqwest"], optional = true }
ra2a = { version = "0.8.1", default-features = false, features = ["client", "server"], optional = true }
rhai = { version = "1", features = ["serde", "sync"], optional = true }

# 核心依赖
async-trait = "0.1"
reqwest = { version = "0.13", features = ["json", "stream","query", "gzip", "brotli", "deflate", "zstd"] }
futures-util = "0.3"
async-stream = "0.3"
bytes = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = { version = "0.9", optional = true }
toml = "0.8"
dom_smoothie = "0.16"
html2text = "0.12"
tokio = { version = "1", features = ["process", "fs", "time", "sync"] }
tracing = "0.1"
url = "2"
regex = "1"
thiserror = "2"
chrono = "0.4"
scraper = "0.22"
backon = "1.5"
# tyme4rs = "1.4"  # API 有重大变化，暂时使用 chrono 实现

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
criterion = "0.5"
anyhow = "1"

[[bench]]
name = "json_serialize"
harness = false

[[bench]]
name = "vector_store_search"
harness = false

# 示例配置
[[example]]
name = "01_basic_chat"
path = "examples/01_basic_chat.rs"
required-features = ["runtime"]

[[example]]
name = "02_provider"
path = "examples/02_provider.rs"

[[example]]
name = "03_tools"
path = "examples/03_tools.rs"

[[example]]
name = "04_memory"
path = "examples/04_memory.rs"

[[example]]
name = "05_conversation"
path = "examples/05_conversation.rs"

[[example]]
name = "06_cost"
path = "examples/06_cost.rs"

[[example]]
name = "07_router_provider"
path = "examples/07_router_provider.rs"

[[example]]
name = "08_resilient_provider"
path = "examples/08_resilient_provider.rs"

[[example]]
name = "09_mcp"
path = "examples/09_mcp.rs"
required-features = ["mcp"]

[[example]]
name = "10_research_assistant"
path = "examples/10_research_assistant.rs"
required-features = ["runtime"]
